name: Build Kardii macOS Intel App

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-macos-intel:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust with Intel target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm install

      - name: Build Intel macOS app
        run: npm run build -- --target x86_64-apple-darwin

      - name: Upload Intel macOS app
        uses: actions/upload-artifact@v4
        with:
          name: Kardii-AI-Companion-macOS-Intel
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app
