<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Kardii</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main id="pet" aria-label="Kardii 桌宠" title="单击聊天，拖动移动，双击切换动作">
      <img id="petImage" src="./assets/pet/idle.webp" alt="Kardii">
    </main>

    <nav id="menu" class="menu hidden" aria-label="Kardii 菜单">
      <button type="button" data-state="idle">🐾 待机</button>
      <button type="button" data-state="loading">⏳ 加载</button>
      <button type="button" data-state="sleep">💤 睡觉</button>
      <button type="button" data-state="error">❌ 报错</button>
      <hr>
      <button type="button" data-action="smaller">－ 缩小</button>
      <button type="button" data-action="larger">＋ 放大</button>
      <button type="button" data-action="reset">↺ 恢复大小</button>
      <hr>
      <button type="button" data-action="hide">隐藏 Kardii</button>
      <button type="button" data-action="quit">退出 Kardii</button>
    </nav>

    <script src="./main.js"></script>
  </body>
</html>
